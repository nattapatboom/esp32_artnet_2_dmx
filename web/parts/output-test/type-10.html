<div id="type-test-10" style="display:none" class="type-test">
  <div class="fg">
    <div class="f">
      <label for="test_duration">Duration (seconds)</label>
      <input type="number" id="test_duration" value="30" min="1" max="300">
    </div>
    <div class="f">
      <label for="test_mp3_track">Track (1-255)</label>
      <input type="number" id="test_mp3_track" value="1" min="0" max="255">
    </div>
    <div class="f">
      <label for="test_mp3_vol">Volume (0-255)</label>
      <input type="range" id="test_mp3_vol" min="0" max="255" value="200" oninput="test_mp3_vol_num.value=this.value">
    </div>
    <div class="f">
      <label for="test_mp3_vol_num">Volume Number</label>
      <input type="number" id="test_mp3_vol_num" value="200" min="0" max="255" oninput="test_mp3_vol.value=this.value">
    </div>
  </div>
  <div class="btns">
    <button type="button" class="btn bg" onclick="testMp3(OUTPUT_IDX,'play')">Play Track</button>
    <button type="button" class="btn bd" onclick="testMp3(OUTPUT_IDX,'stop')">Stop</button>
    <button type="button" class="btn bs" onclick="testMp3(OUTPUT_IDX,'pause')">Pause</button>
    <button type="button" class="btn bp" onclick="testMp3(OUTPUT_IDX,'next')">Next</button>
    <button type="button" class="btn bp" onclick="testMp3(OUTPUT_IDX,'prev')">Prev</button>
  </div>
</div>
