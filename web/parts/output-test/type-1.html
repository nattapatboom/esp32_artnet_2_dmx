<div id="type-test-1" style="display:none" class="type-test">
  <div class="fg">
    <div class="f">
      <label for="test_duration">Duration (seconds)</label>
      <input type="number" id="test_duration" value="30" min="1" max="300">
    </div>
    <div class="f">
      <label for="test_dmx_ch">DMX Channel</label>
      <input type="number" id="test_dmx_ch" value="1" min="1" max="512">
    </div>
    <div class="f">
      <label for="test_level">Value</label>
      <input type="range" id="test_level" min="0" max="255" value="255" oninput="test_level_num.value=this.value">
    </div>
    <div class="f">
      <label for="test_level_num">Value Number</label>
      <input type="number" id="test_level_num" value="255" min="0" max="255" oninput="test_level.value=this.value">
    </div>
  </div>
  <div class="btns">
    <button type="button" class="btn bp" onclick="testDmx(OUTPUT_IDX)">Send Channel</button>
    <button type="button" class="btn bd" onclick="sendOutputTest(OUTPUT_IDX,[],1000)">Blackout DMX</button>
  </div>
</div>
