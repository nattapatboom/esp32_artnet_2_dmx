<div id="type-test-14" style="display:none" class="type-test">
  <div class="fg">
    <div class="f">
      <label for="test_duration">Duration (seconds)</label>
      <input type="number" id="test_duration" value="30" min="1" max="300">
    </div>
    <div class="f">
      <label for="test_dac_val">Value (0-255)</label>
      <input type="range" id="test_dac_val" min="0" max="255" value="128" oninput="test_dac_val_num.value=this.value">
    </div>
    <div class="f">
      <label for="test_dac_val_num">Value Number</label>
      <input type="number" id="test_dac_val_num" value="128" min="0" max="255" oninput="test_dac_val.value=this.value">
    </div>
  </div>
  <div class="btns">
    <button type="button" class="btn bg" onclick="sendOutputTest(OUTPUT_IDX,[parseInt(document.getElementById('test_dac_val').value)],testDur())">Set</button>
    <button type="button" class="btn bd" onclick="sendOutputTest(OUTPUT_IDX,[0],1000)">Zero</button>
    <button type="button" class="btn bs" onclick="sendOutputTest(OUTPUT_IDX,[255],1000)">Full</button>
  </div>
</div>
