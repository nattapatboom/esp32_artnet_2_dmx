<div id="type-test-11" style="display:none" class="type-test">
  <div class="fg">
    <div class="f">
      <label for="test_duration">Duration (seconds)</label>
      <input type="number" id="test_duration" value="30" min="1" max="300">
    </div>
    <div class="f" id="test_7seg_num_grp">
      <label for="test_7seg_num">Number (0-9999)</label>
      <input type="number" id="test_7seg_num" value="1234" min="0" max="9999">
    </div>
    <div class="f" id="test_7seg_text_grp" style="display:none">
      <label for="test_7seg_text">Text (4 chars)</label>
      <input type="text" id="test_7seg_text" value="TEST" maxlength="4">
      <div class="hint">Sends ASCII bytes to the TM1637 display.</div>
    </div>
  </div>
  <div class="btns">
    <button type="button" class="btn bp" id="test_7seg_show_btn" onclick="test7Seg(OUTPUT_IDX)">Show Number</button>
    <button type="button" class="btn bd" onclick="sendOutputTest(OUTPUT_IDX,[0,0],1000)">Zero</button>
    <button type="button" class="btn bd" onclick="sendOutputTest(OUTPUT_IDX,[32,32,32,32],1000)">Blank</button>
  </div>
</div>
