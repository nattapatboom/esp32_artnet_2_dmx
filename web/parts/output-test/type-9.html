<div id="type-test-9" style="display:none" class="type-test">
  <div class="fg">
    <div class="f">
      <label for="test_duration">Duration (seconds)</label>
      <input type="number" id="test_duration" value="30" min="1" max="300">
    </div>
    <div class="f">
      <label for="test_buz_freq">Frequency</label>
      <input type="range" id="test_buz_freq" min="0" max="255" value="128" oninput="test_buz_freq_num.value=this.value">
    </div>
    <div class="f">
      <label for="test_buz_freq_num">Frequency Value (1-255 &rarr; 100-5000Hz)</label>
      <input type="number" id="test_buz_freq_num" value="128" min="0" max="255" oninput="test_buz_freq.value=this.value">
    </div>
    <div class="f">
      <label for="test_buz_vol">Volume</label>
      <input type="range" id="test_buz_vol" min="0" max="255" value="200" oninput="test_buz_vol_num.value=this.value">
    </div>
    <div class="f">
      <label for="test_buz_vol_num">Volume Number</label>
      <input type="number" id="test_buz_vol_num" value="200" min="0" max="255" oninput="test_buz_vol.value=this.value">
    </div>
  </div>
  <div class="btns">
    <button type="button" class="btn bg" onclick="sendOutputTest(OUTPUT_IDX,[parseInt(document.getElementById('test_buz_freq').value),parseInt(document.getElementById('test_buz_vol').value)],testDur())">Play</button>
    <button type="button" class="btn bd" onclick="sendOutputTest(OUTPUT_IDX,[0,0],1000)">Stop</button>
  </div>
</div>
