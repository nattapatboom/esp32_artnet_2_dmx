<div id="type-test-0" style="display:none" class="type-test">
  <div class="fg">
    <div class="f">
      <label for="test_duration">Duration (seconds)</label>
      <input type="number" id="test_duration" value="30" min="1" max="300">
    </div>
    <div class="f">
      <label for="test_level">Level</label>
      <input type="range" id="test_level" min="0" max="255" value="128" oninput="test_level_num.value=this.value">
    </div>
    <div class="f">
      <label for="test_level_num">Value Number</label>
      <input type="number" id="test_level_num" value="128" min="0" max="255" oninput="test_level.value=this.value">
    </div>
  </div>
  <div class="btns">
    <button type="button" class="btn bp" onclick="testSingleValue(OUTPUT_IDX)">Apply</button>
    <button type="button" class="btn bs" onclick="testSinglePreset(OUTPUT_IDX,0)">Min/Off</button>
    <button type="button" class="btn bg" onclick="testSinglePreset(OUTPUT_IDX,255)">Max</button>
  </div>
</div>
