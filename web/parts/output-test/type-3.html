<div id="type-test-3" style="display:none" class="type-test">
  <div class="fg">
    <div class="f">
      <label for="test_duration">Duration (seconds)</label>
      <input type="number" id="test_duration" value="30" min="1" max="300">
    </div>
    <div class="f">
      <label for="test_color">Custom Color</label>
      <input type="color" id="test_color" value="#ff0000">
    </div>
    <div class="f" id="test_white_group" style="display:none">
      <label for="test_white">White</label>
      <input type="number" id="test_white" value="0" min="0" max="255">
    </div>
    <div class="f">
      <label for="test_pixel">Single Pixel Number</label>
      <input type="number" id="test_pixel" value="1" min="1" max="1360">
      <div class="hint">Use one lit pixel to count LEDs. Pixel numbering starts at 1.</div>
    </div>
  </div>
  <div class="btns">
    <button type="button" class="btn bp" onclick="testLed(OUTPUT_IDX,'all')">All Custom</button>
    <button type="button" class="btn bd" onclick="testLedPreset(OUTPUT_IDX,255,0,0,'all')">All Red</button>
    <button type="button" class="btn bg" onclick="testLedPreset(OUTPUT_IDX,0,255,0,'all')">All Green</button>
    <button type="button" class="btn bp" onclick="testLedPreset(OUTPUT_IDX,0,0,255,'all')">All Blue</button>
    <button type="button" class="btn bd" onclick="testLed(OUTPUT_IDX,'pixel')">Pixel Custom</button>
    <button type="button" class="btn bd" onclick="testLedPreset(OUTPUT_IDX,255,0,0,'pixel')">Pixel Red</button>
    <button type="button" class="btn bg" onclick="testLedPreset(OUTPUT_IDX,0,255,0,'pixel')">Pixel Green</button>
    <button type="button" class="btn bp" onclick="testLedPreset(OUTPUT_IDX,0,0,255,'pixel')">Pixel Blue</button>
    <button type="button" class="btn bd" onclick="sendOutputTest(OUTPUT_IDX,[],1000)">Blackout</button>
  </div>
</div>
