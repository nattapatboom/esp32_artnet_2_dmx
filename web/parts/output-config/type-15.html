<div id="type-config-15" style="display:none" class="type-config">
  <div class="f" id="mc_res_grp"><label for="mc_resolution" id="mc_resolution_lbl">Resolution</label>
    <select id="mc_resolution">
      <option value="8">8-bit (1 DMX Ch)</option>
      <option value="10">10-bit (2 DMX Ch)</option>
      <option value="12">12-bit (2 DMX Ch)</option>
      <option value="16">16-bit (2 DMX Ch)</option>
    </select>
  </div>
  <div class="f" id="mc_freq_grp"><label for="mc_freq" id="mc_freq_lbl">PWM Carrier Frequency (Hz)</label><input type="number" id="mc_freq" value="1000" min="1" max="40000"></div>
  <div id="rc_filter_grp" style="flex-basis:100%"><div class="ib ib-purple" style="font-size:0.78rem;margin:8px 0 2px">RC Low-Pass Filter Reference</div><div style="display:flex;flex-wrap:wrap;gap:8px"><div class="f" style="flex:1"><label for="rc_r">R (&Omega;)</label><input type="number" id="rc_r" value="1000" min="1" max="10000000" oninput="calcRcCutoff()"></div><div class="f" style="flex:1"><label for="rc_c">C (nF)</label><input type="number" id="rc_c" value="10" min="1" max="1000000" oninput="calcRcCutoff()"></div><div class="f" style="flex:1"><label>fc ≈ <span id="rc_fc">15915</span> Hz</label><div class="hint">Set PWM Carrier Freq above to 3-5x fc</div></div></div></div>
  <div id="pwm_dac_cal_grp" style="flex-basis:100%"><div class="ib ib-purple" style="font-size:0.78rem;margin:8px 0 2px">PWM DAC Calibration</div><div style="display:flex;flex-wrap:wrap;gap:8px"><div class="f" style="flex:1"><label for="pwm_dac_mode">Output Use</label><select id="pwm_dac_mode"><option value="0">Custom</option><option value="1">0-10V interface</option><option value="2">4-20mA interface</option></select><div class="hint">Label only; duty calibration below controls output.</div></div><div class="f" style="flex:1"><label for="pwm_dac_min">DMX 0 Duty (%)</label><input type="number" id="pwm_dac_min" value="0" min="0" max="100" step="0.01"></div><div class="f" style="flex:1"><label for="pwm_dac_max">DMX Full Duty (%)</label><input type="number" id="pwm_dac_max" value="100" min="0" max="100" step="0.01"><div class="hint">Use trim values matching your 0-10V / 4-20mA module.</div></div></div></div>
</div>
