<div id="type-config-13" style="display:none" class="type-config">
  <div class="f" id="mc_mode_grp"><label for="mc_mode" id="mc_mode_lbl">Display Mode</label>
    <select id="mc_mode">
      <option value="-1">Direct 8-pin (1 Ch - No Dim)</option>
      <option value="5">Direct 8-pin Dim (2 Ch - Char+Dim)</option>
      <option value="8">CA 8-pin Dim (2 Ch - COM Anode)</option>
      <option value="9">CC 8-pin Dim (2 Ch - COM Cathode)</option>
    </select>
  </div>
  <div class="f" id="mc_res_grp"><label for="mc_resolution" id="mc_resolution_lbl">Decode Mode</label>
    <select id="mc_resolution">
      <option value="8">ASCII / Character</option>
      <option value="10">Numeric (0-9, 10-19 for DP)</option>
    </select>
  </div>
  <div class="f" id="mc_freq_grp"><label for="mc_freq" id="mc_freq_lbl">PWM Frequency (Hz)</label><input type="number" id="mc_freq" value="1000" min="1" max="40000"></div>
</div>
