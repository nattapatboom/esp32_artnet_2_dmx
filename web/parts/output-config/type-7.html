<div id="type-config-7" style="display:none" class="type-config">
  <div class="f" id="mc_res_grp"><label for="mc_resolution" id="mc_resolution_lbl">Resolution</label>
    <select id="mc_resolution">
      <option value="8">8-bit (1 Pos Ch)</option>
      <option value="10">10-bit (2 Pos Ch)</option>
      <option value="12">12-bit (2 Pos Ch)</option>
      <option value="16">16-bit (2 Pos Ch)</option>
      <option value="24">24-bit (3 Pos Ch)</option>
      <option value="32">32-bit (4 Pos Ch)</option>
    </select>
  </div>
  <div class="f" id="mc_freq_grp"><label for="mc_freq" id="mc_freq_lbl">Speed (Hz)</label><input type="number" id="mc_freq" value="1000" min="1" max="40000"></div>
  <div id="mc_stepper_scale_grp" style="flex-basis:100%"><div class="ib ib-purple" style="font-size:0.78rem;margin:4px 0 2px">Position &amp; Scaling</div></div>
  <div class="f" id="mc_steps_grp"><label for="mc_steps_per_rev">Steps / Rev</label><input type="number" id="mc_steps_per_rev" value="200" min="1" max="10000"></div>
  <div class="f" id="mc_unit_type_grp"><label for="mc_unit_type">Unit Type</label><select id="mc_unit_type"><option value="0">Steps</option><option value="1">Degrees (&deg;)</option><option value="2">Millimeters (mm)</option></select></div>
  <div class="f" id="mc_scale_factor_grp"><label for="mc_scale_factor">Scale Factor</label><input type="number" id="mc_scale_factor" value="0.0" step="any" min="0" max="10000"><div class="hint">Steps = DMX * Scale (0 = use Steps/Rev)</div></div>
  <div id="mc_stepper_homing_grp" style="flex-basis:100%"><div class="ib ib-purple" style="font-size:0.78rem;margin:4px 0 2px">Homing Settings</div></div>
  <div class="f" id="mc_homing_mode_grp"><label for="mc_homing_mode">Homing Mode</label>
    <select id="mc_homing_mode">
      <option value="0">Sensor Mode (Pin 4)</option>
      <option value="1">Time / Stall Mode</option>
    </select>
  </div>
  <div class="f" id="mc_homing_dir_grp"><label for="mc_homing_dir">Homing Direction</label>
    <select id="mc_homing_dir">
      <option value="0">Normal / Forward</option>
      <option value="1">Reverse</option>
    </select>
  </div>
  <div class="f" id="mc_homing_speed_grp"><label for="mc_homing_speed">Homing Speed (Hz)</label><input type="number" id="mc_homing_speed" value="500" min="1" max="40000"></div>
  <div class="f" id="mc_homing_timeout_grp"><label for="mc_homing_timeout">Homing Timeout (s)</label><input type="number" id="mc_homing_timeout" value="5" min="1" max="100"></div>
  <div class="f" id="mc_invert_grp" style="flex:0 0 auto"><div class="cb"><input type="checkbox" id="mc_invert"><label for="mc_invert">Invert Direction</label></div></div>
</div>
